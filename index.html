<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absensi Coco Mari</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .fade {
      animation: fade 0.5s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">

    <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl fade">

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
        <div>
          <h1 class="text-3xl md:text-4xl font-bold text-white">Absensi Coco Mari</h1>
          <p class="text-white/80 mt-2">Shift Pagi 08:10 - 15:30 | Shift Sore 15:10 - 23:00</p>
        </div>

        <div class="bg-white rounded-2xl px-5 py-3 shadow-lg">
          <p class="text-sm text-gray-500">Tanggal Hari Ini</p>
          <h2 id="todayDate" class="font-bold text-lg text-pink-500"></h2>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-6 mb-8">

        <div class="bg-white rounded-3xl p-6 shadow-xl">
          <h2 class="text-2xl font-bold text-pink-500 mb-5">Form Absensi</h2>

          <div class="space-y-4">

            <div>
              <label class="font-medium text-gray-700">Nama Karyawan</label>
              <select id="nama" class="w-full mt-2 p-3 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400">
                <option value="">Pilih Nama</option>
                <option>Alka Rizki</option>
                <option>Salsa Amelia</option>
                <option>Rahmat Abdillah</option>
              </select>
            </div>

            <div>
              <label class="font-medium text-gray-700">Pilih Shift</label>
              <select id="shift" class="w-full mt-2 p-3 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400">
                <option value="">Pilih Shift</option>
                <option value="08:10">Shift Pagi (08:10 - 15:30)</option>
                <option value="15:10">Shift Sore (15:10 - 23:00)</option>
              </select>
            </div>

            <div>
              <label class="font-medium text-gray-700">Jam Masuk</label>
              <input type="time" id="jamMasuk" class="w-full mt-2 p-3 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400">
            </div>

            <div>
              <label class="font-medium text-gray-700">Keterangan Jika Terlambat</label>
              <textarea id="keterangan" rows="3" placeholder="Isi alasan keterlambatan..."
                class="w-full mt-2 p-3 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400"></textarea>
            </div>

            <button onclick="absen()"
              class="w-full bg-pink-500 hover:bg-pink-600 text-white font-semibold py-3 rounded-2xl transition duration-300 shadow-lg">
              Simpan Absensi
            </button>

          </div>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-xl">
          <h2 class="text-2xl font-bold text-pink-500 mb-5">Statistik Hari Ini</h2>

          <div class="grid grid-cols-2 gap-4">

            <div class="bg-pink-100 rounded-2xl p-5 text-center">
              <h3 class="text-gray-600 font-medium">Total Hadir</h3>
              <p id="totalHadir" class="text-4xl font-bold text-pink-500 mt-2">0</p>
            </div>

            <div class="bg-red-100 rounded-2xl p-5 text-center">
              <h3 class="text-gray-600 font-medium">Terlambat</h3>
              <p id="totalTerlambat" class="text-4xl font-bold text-red-500 mt-2">0</p>
            </div>

          </div>

          <div class="mt-8 bg-pink-50 rounded-2xl p-5">
            <h3 class="font-bold text-pink-500 mb-3">Info Shift</h3>

            <div class="space-y-3 text-gray-700">
              <div class="flex justify-between bg-white rounded-xl p-3">
                <span>Shift Pagi</span>
                <span class="font-semibold">08:10 - 15:30</span>
              </div>

              <div class="flex justify-between bg-white rounded-xl p-3">
                <span>Shift Sore</span>
                <span class="font-semibold">15:10 - 23:00</span>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="bg-white rounded-3xl p-6 shadow-xl fade">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
          <h2 class="text-2xl font-bold text-pink-500">History Absensi Bulanan</h2>

          <input type="month" id="filterBulan"
            class="border border-pink-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400"
            onchange="renderTable()">
        </div>

        <div class="overflow-x-auto">
          <table class="w-full min-w-[900px] border-collapse overflow-hidden rounded-2xl">
            <thead>
              <tr class="bg-pink-500 text-white text-left">
                <th class="p-4">Tanggal</th>
                <th class="p-4">Nama</th>
                <th class="p-4">Shift</th>
                <th class="p-4">Jam Masuk</th>
                <th class="p-4">Status</th>
                <th class="p-4">Keterangan</th>
              </tr>
            </thead>

            <tbody id="tableBody" class="bg-pink-50">
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    const today = new Date();

    document.getElementById('todayDate').innerText = today.toLocaleDateString('id-ID', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    const filter = document.getElementById('filterBulan');
    filter.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;

    let dataAbsensi = JSON.parse(localStorage.getItem('absensiCocoMari')) || [];

    function absen() {
      const nama = document.getElementById('nama').value;
      const shift = document.getElementById('shift').value;
      const jamMasuk = document.getElementById('jamMasuk').value;
      const keterangan = document.getElementById('keterangan').value;

      if (!nama || !shift || !jamMasuk) {
        alert('Lengkapi data absensi terlebih dahulu!');
        return;
      }

      let status = 'Tepat Waktu';

      if (jamMasuk > shift) {
        status = 'Terlambat';
      }

      const absenBaru = {
        tanggal: new Date().toISOString(),
        nama,
        shift: shift === '08:10' ? 'Pagi' : 'Sore',
        jamMasuk,
        status,
        keterangan: status === 'Terlambat' ? keterangan || '-' : '-'
      };

      dataAbsensi.push(absenBaru);

      localStorage.setItem('absensiCocoMari', JSON.stringify(dataAbsensi));

      alert('Absensi berhasil disimpan!');

      document.getElementById('nama').value = '';
      document.getElementById('shift').value = '';
      document.getElementById('jamMasuk').value = '';
      document.getElementById('keterangan').value = '';

      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      const bulanDipilih = document.getElementById('filterBulan').value;

      const filtered = dataAbsensi.filter(item => {
        const tgl = new Date(item.tanggal);
        const bulan = `${tgl.getFullYear()}-${String(tgl.getMonth()+1).padStart(2,'0')}`;
        return bulan === bulanDipilih;
      });

      let hadir = filtered.length;
      let terlambat = filtered.filter(item => item.status === 'Terlambat').length;

      document.getElementById('totalHadir').innerText = hadir;
      document.getElementById('totalTerlambat').innerText = terlambat;

      if (filtered.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="text-center p-6 text-gray-500">
              Belum ada data absensi bulan ini.
            </td>
          </tr>
        `;

        return;
      }

      filtered.reverse().forEach(item => {
        const row = `
          <tr class="border-b border-pink-100 hover:bg-pink-100 transition">
            <td class="p-4">${new Date(item.tanggal).toLocaleDateString('id-ID')}</td>
            <td class="p-4 font-medium">${item.nama}</td>
            <td class="p-4">Shift ${item.shift}</td>
            <td class="p-4">${item.jamMasuk}</td>
            <td class="p-4">
              <span class="px-3 py-1 rounded-full text-sm font-semibold ${item.status === 'Terlambat'
                ? 'bg-red-100 text-red-500'
                : 'bg-green-100 text-green-600'}">
                ${item.status}
              </span>
            </td>
            <td class="p-4">${item.keterangan}</td>
          </tr>
        `;

        tbody.innerHTML += row;
      });
    }

    renderTable();
  </script>

</body>
</html>
